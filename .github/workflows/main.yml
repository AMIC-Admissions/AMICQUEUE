name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build --prefix apps/web
        env:
          GITHUB_PAGES: true
          VITE_USE_LOCAL_DB: ${{ vars.VITE_USE_LOCAL_DB }}
          VITE_POCKETBASE_URL: ${{ vars.VITE_POCKETBASE_URL }}
          VITE_API_SERVER_URL: ${{ vars.VITE_API_SERVER_URL }}

      - name: Add GitHub Pages fallback
        run: cp dist/apps/web/index.html dist/apps/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
