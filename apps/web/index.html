<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="generator" content="Hostinger Horizons" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hostinger Horizons</title>
		<script>
			(function restoreRedirectedRoute() {
				const redirectedPath = sessionStorage.getItem('redirectPath');
				if (!redirectedPath) return;

				sessionStorage.removeItem('redirectPath');

				const currentBasePath = window.location.pathname.replace(/\/$/, '');
				const normalizedPath = redirectedPath.startsWith('/')
					? redirectedPath
					: `/${redirectedPath}`;
				const nextUrl = `${currentBasePath}${normalizedPath}`;

				window.history.replaceState(null, '', nextUrl);
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
